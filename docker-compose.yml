services:
  claude-sandbox:
    build: .
    container_name: claude-sandbox
    hostname: claude-sandbox
    stdin_open: true
    tty: true
    volumes:
      # Mount your projects directory
      - ./workspace:/home/claude/workspace
      # Persist Claude Code settings between sessions
      - claude-config:/home/claude/.claude
      # Persist shell history
      - claude-history:/home/claude/.bash_history
    environment:
      - TERM=xterm-256color
      # Pass through Anthropic API key if set
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    # For firewall rules (optional - requires privileged mode)
    # cap_add:
    #   - NET_ADMIN

volumes:
  claude-config:
  claude-history:
